# Test 6: PP4 + DEP4 + MTP - MTP开启测试
name: "gb300-fp4-128k8k-acc-test6-top-of-curve-mtp"

model:
  path: "dsfp4"
  container: "yamy-1215"
  precision: "fp4"

resources:
  gpu_type: "gb300"
  decode_nodes: 1
  decode_workers: 1
  gpus_per_node: 4
  prefill_nodes: 1
  prefill_workers: 1

backend:

  decode_environment:
    SGLANG_SYMM_MEM_PREALLOC_GB_SIZE: '8'
    DYN_SKIP_SGLANG_LOG_FORMATTING: '1'
    FLASHINFER_DISABLE_VERSION_CHECK: '1'
    FLASHINFER_WORKSPACE_BASE: /configs/flashinfer-cache
    MC_FORCE_MNNVL: '1'
    NCCL_CUMEM_ENABLE: '1'
    NCCL_MNNVL_ENABLE: '1'
    PYTHONUNBUFFERED: '1'
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: '1000'
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: '1'
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: '100000'
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: '100000'
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: '100000'
    SGLANG_ENABLE_JIT_DEEPGEMM: 'false'
    SGLANG_FLASHINFER_FP4_GEMM_BACKEND: cutlass
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: 'True'
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: '0'
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: '1800'
    SGLANG_ENABLE_SPEC_V2: '1'
    # DEBUG: Scale FutureMap buffer to test overwrite hypothesis (default=1, set 8/16 to test)
    SGLANG_FUTURE_MAP_SCALE: '8'
    # EXPERIMENT: Disable draft KV transfer to verify if draft KV is the root cause of acclen=3.0
    # SGLANG_DISABLE_DRAFT_KV_TRANSFER: '1'
    # EXPERIMENT: Only transfer draft KV on last chunk to test async overwrite hypothesis
    # If accept_len improves significantly, it means intermediate chunks' draft KV are being overwritten
    SGLANG_DRAFT_KV_ONLY_LAST_CHUNK: '1'

  prefill_environment:
    SGLANG_SYMM_MEM_PREALLOC_GB_SIZE: '8'
    DYN_SKIP_SGLANG_LOG_FORMATTING: '1'
    FLASHINFER_DISABLE_VERSION_CHECK: '1'
    FLASHINFER_WORKSPACE_BASE: /configs/flashinfer-cache
    MC_FORCE_MNNVL: '1'
    NCCL_CUMEM_ENABLE: '1'
    NCCL_MNNVL_ENABLE: '1'
    PYTHONUNBUFFERED: '1'
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: '1000'
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: '1'
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: '100000'
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: '100000'
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: '100000'
    SGLANG_ENABLE_JIT_DEEPGEMM: 'false'
    SGLANG_FLASHINFER_FP4_GEMM_BACKEND: cutlass
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: 'True'
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: '0'
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: '1800'
    SGLANG_ENABLE_SPEC_V2: '1'
    # EXPERIMENT: Disable draft KV transfer to verify if draft KV is the root cause of acclen=3.0
    # SGLANG_DISABLE_DRAFT_KV_TRANSFER: '1'
    # EXPERIMENT: Only transfer draft KV on last chunk to test async overwrite hypothesis
    # If accept_len improves significantly, it means intermediate chunks' draft KV are being overwritten
    SGLANG_DRAFT_KV_ONLY_LAST_CHUNK: '1'

  sglang_config:
    decode:
      attention-backend: trtllm_mla
      chunked-prefill-size: 8192
      # context-length: 136000
      cuda-graph-max-bs: 256
      # EXPERIMENT: Set DP=1 to make decode_tp=4 (same as prefill attn_tp=4)
      # Original: data-parallel-size: 4, enable-dp-attention: true, expert-parallel-size: 4
      data-parallel-size: 1
      disable-radix-cache: true
      disaggregation-bootstrap-port: 30001
      disaggregation-mode: decode
      disaggregation-transfer-backend: nixl
      # enable-dp-attention: true  # Disabled because DP=1
      enable-symm-mem: true
      expert-parallel-size: 1
      kv-cache-dtype: fp8_e4m3
      mem-fraction-static: 0.85
      model-path: /model/
      moe-dense-tp-size: 1
      moe-runner-backend: flashinfer_trtllm
      prefill-round-robin-balance: true
      quantization: modelopt_fp4
      scheduler-recv-interval: 1
      served-model-name: nvidia/DeepSeek-R1-0528-NVFP4-v2
      speculative-algorithm: "EAGLE"
      speculative-num-steps: 2
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 3
      stream-interval: 10
      tensor-parallel-size: 4
      trust-remote-code: true
      watchdog-timeout: 1000000

    prefill:
      attention-backend: trtllm_mla
      chunked-prefill-size: 8192
      # context-length: 136000
      data-parallel-size: 1
      disable-radix-cache: true
      disaggregation-bootstrap-port: 30001
      disaggregation-mode: prefill
      disaggregation-transfer-backend: nixl
      enable-symm-mem: true
      expert-parallel-size: 1
      kv-cache-dtype: fp8_e4m3
      load-balance-method: round_robin
      max-running-requests: 16
      mem-fraction-static: 0.72
      model-path: /model/
      moe-dense-tp-size: 1
      moe-runner-backend: flashinfer_trtllm
      pipeline-parallel-size: 1
      quantization: modelopt_fp4
      scheduler-recv-interval: 1
      served-model-name: nvidia/DeepSeek-R1-0528-NVFP4-v2
      stream-interval: 10
      tensor-parallel-size: 4
      trust-remote-code: true
      watchdog-timeout: 1000000
      speculative-algorithm: "EAGLE"
      speculative-num-steps: 2
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 3
      # DEBUG: Enable NaN detection to catch numerical instability
      enable-nan-detection: true
      # FIX: overlap schedule is now properly synchronized in disagg prefill
      # disable-overlap-schedule: true  # No longer needed after stream sync fix

extra_mount:
  - "/home/yangminl/files/workspace2/sglang:/sgl-workspace/sglang"

benchmark:
  type: "longbenchv2"

