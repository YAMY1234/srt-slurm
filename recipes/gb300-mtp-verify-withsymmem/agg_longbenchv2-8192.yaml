# Aggregated mode for LongBench-v2 evaluation with SPEC_V2
# 单节点 aggregated setup，非 disaggregated (prefill/decode 分离)
name: "gb300-fp4-agg_longbenchv2"

model:
  path: "dsfp4"
  container: "yamy-1215"
  precision: "fp4"

extra_mount: ["/home/yangminl/files/workspace2/sglang:/sgl-workspace/sglang"]

resources:
  gpu_type: "gb300"
  
  # Aggregated mode - 使用 agg_nodes/agg_workers 而不是 prefill/decode
  agg_nodes: 1       # 总节点数
  agg_workers: 1     # worker 进程数
  gpus_per_node: 4

backend:
  aggregated_environment:
    SGLANG_SYMM_MEM_PREALLOC_GB_SIZE: '8'
    FLASHINFER_DISABLE_VERSION_CHECK: "1"
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_ENABLE_JIT_DEEPGEMM: "false"
    SGLANG_ENABLE_FLASHINFER_GEMM: "true"
    FLASHINFER_WORKSPACE_BASE: /configs/flashinfer-cache
    # TRITON_PTXAS_PATH: "/usr/local/cuda/bin/ptxas"
    # SPEC_V2 环境变量
    SGLANG_ENABLE_SPEC_V2: "1"

  sglang_config:
    # Aggregated 模式：不需要 disaggregation-mode，单一 worker 同时处理 prefill 和 decode
    aggregated:
      served-model-name: "nvidia/DeepSeek-R1-0528-NVFP4-v2"
      model-path: "/model/"
      trust-remote-code: true
      disable-radix-cache: true
      kv-cache-dtype: "fp8_e4m3"
      attention-backend: "trtllm_mla"
      quantization: "modelopt_fp4"
      moe-runner-backend: "flashinfer_trtllm"
      stream-interval: 10
      watchdog-timeout: 1000000
      # context-length: 136000
      chunked-prefill-size: 8192
      mem-fraction-static: 0.72
      moe-dense-tp-size: 1
      tensor-parallel-size: 4
      # DP attention 配置
      # data-parallel-size: 4
      # expert-parallel-size: 4
      enable-dp-attention: true
      enable-symm-mem: true
      # Speculative decoding (EAGLE)
      speculative-algorithm: "EAGLE"
      speculative-num-steps: 2
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 3

benchmark:
  type: "longbenchv2"

