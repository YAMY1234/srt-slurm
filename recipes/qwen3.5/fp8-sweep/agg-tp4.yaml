# Qwen3.5-397B-A17B-FP8 Aggregated TP4 on GB200
# Pure tensor parallel, no expert parallel

name: "qwen3.5-agg-tp4"

model:
  path: "qwen3.5-fp8"
  container: "dev"
  precision: "fp8"

extra_mount:
  - "/lustre/fsw/coreai_comparch_trtllm/yangminl/sglang:/sgl-workspace/sglang"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  agg_nodes: 1
  agg_workers: 1

backend:
  type: sglang

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"

  sglang_config:
    aggregated:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 4

      mamba-scheduler-strategy: "extra_buffer"
      mamba-track-interval: 128
      mamba-ssm-dtype: "bfloat16"

      mem-fraction-static: 0.75
      chunked-prefill-size: 2048
      context-length: 262144

      watchdog-timeout: 600
      enable-multimodal: true
      reasoning-parser: qwen3

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "8x32x128x256x512x1024"
  req_rate: "inf"
