# Repro: int32 overflow in mooncake KV transfer for non-MLA + heterogeneous TP
# Prefill TP4 (1 node) + Decode TP8/DP8 with dp-attention (2 nodes), NO DeepEP
# DP attention makes decode attn_tp_size=1, avoiding division-by-zero with 2 KV heads
# Still triggers send_kvcache_slice (prefill attn_tp=4 != decode attn_tp=1)

name: "qwen3.5-repro-int32-overflow"

model:
  path: "qwen3.5-fp8"
  container: "dev"
  precision: "fp8"

extra_mount: ["/lustre/fsw/coreai_comparch_trtllm/yangminl/sglang:/sgl-workspace/sglang"]

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1

backend:

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    MC_FORCE_MNNVL: "1"
    SGLANG_DG_CACHE_DIR: "/configs/deepgemm-cache"
    FLASHINFER_WORKSPACE_BASE: "/configs/flashinfer-cache"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: "1000"
    SGLANG_HACK_SEQ_BOOTSTRAP_ROOM: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  sglang_config:
    prefill:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      # Prefill: simple TP4 on 1 node
      tensor-parallel-size: 4
      data-parallel-size: 1
      expert-parallel-size: 1

      # Mamba
      mamba-scheduler-strategy: "extra_buffer"
      mamba-track-interval: 128
      mamba-ssm-dtype: "bfloat16"

      # PD disaggregation - tell prefill about decode's TP8/DP8 layout
      disaggregation-mode: "prefill"
      disable-radix-cache: true
      disaggregation-decode-tp: 8
      disaggregation-decode-dp: 8

      mem-fraction-static: 0.75
      chunked-prefill-size: 2048
      context-length: 262144
      load-balance-method: "round_robin"
      watchdog-timeout: 1000000
      disable-cuda-graph: true

    decode:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      model-path: "/model/"
      trust-remote-code: true

      # Decode: TP8/DP8 with dp-attention across 2 nodes, NO DeepEP
      tp-size: 8
      dp-size: 8
      ep-size: 1
      enable-dp-attention: true

      # Mamba + 3x pool (values are global, divided by dp_size=8 internally)
      mamba-scheduler-strategy: "extra_buffer"
      mamba-track-interval: 128
      mamba-ssm-dtype: "bfloat16"
      max-mamba-cache-size: 2400
      max-running-requests: 800

      # PD disaggregation
      disaggregation-mode: "decode"
      disable-radix-cache: true

      mem-fraction-static: 0.60
      chunked-prefill-size: 2048
      context-length: 262144
      watchdog-timeout: 1000000

benchmark:
  type: "gpqa"
  num_examples: 198
  max_tokens: 65536
  repeat: 1
  num_threads: 128
