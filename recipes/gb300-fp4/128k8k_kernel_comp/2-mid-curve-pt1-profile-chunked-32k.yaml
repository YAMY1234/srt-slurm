# This config currently serves as the top of the mid curve and low latency points on pareto
# Profile version - chunked prefill 32k (non-cutlass, flashinfer_trtllm)

name: "gb200-fp4-128k8k-2-mid-curve-pt1-profile-chunked-32k"

slurm:
  partition: "gb200"

model:
  path: "dsfp4"
  container: "v0.5.7"
  precision: "fp4"

extra_mount:
  - "/lustre/fsw/coreai_comparch_trtllm/yangminl/sglang:/sgl-workspace/sglang"

resources:
  gpu_type: "gb200"
  decode_nodes: 1
  decode_workers: 1
  gpus_per_node: 4
  prefill_nodes: 1
  prefill_workers: 1

dynamo:
  version: "0.8.0"

backend:

  decode_environment:
    DYN_SKIP_SGLANG_LOG_FORMATTING: '1'
    FLASHINFER_DISABLE_VERSION_CHECK: '1'
    FLASHINFER_WORKSPACE_BASE: /configs/flashinfer-cache
    MC_FORCE_MNNVL: '1'
    NCCL_CUMEM_ENABLE: '1'
    NCCL_MNNVL_ENABLE: '1'
    PYTHONUNBUFFERED: '1'
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: '1000'
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: '1'
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: '100000'
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: '100000'
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: '100000'
    SGLANG_ENABLE_JIT_DEEPGEMM: 'false'
    SGLANG_FLASHINFER_FP4_GEMM_BACKEND: cutlass
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: 'True'
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: '0'
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: '1800'
    SGLANG_LOG_FORWARD_ITERS: "1"

  prefill_environment:
    DYN_SKIP_SGLANG_LOG_FORMATTING: '1'
    FLASHINFER_DISABLE_VERSION_CHECK: '1'
    FLASHINFER_WORKSPACE_BASE: /configs/flashinfer-cache
    MC_FORCE_MNNVL: '1'
    NCCL_CUMEM_ENABLE: '1'
    NCCL_MNNVL_ENABLE: '1'
    PYTHONUNBUFFERED: '1'
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: '1000'
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: '1'
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: '100000'
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: '100000'
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: '100000'
    SGLANG_ENABLE_JIT_DEEPGEMM: 'false'
    SGLANG_FLASHINFER_FP4_GEMM_BACKEND: cutlass
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: 'True'
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: '0'
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: '1800'
    SGLANG_LOG_FORWARD_ITERS: "1"

  sglang_config:
    decode:
      attention-backend: trtllm_mla
      chunked-prefill-size: -1
      context-length: 136001
      cuda-graph-max-bs: 256
      data-parallel-size: 4
      disable-radix-cache: true
      disaggregation-bootstrap-port: 30001
      disaggregation-mode: decode
      disaggregation-transfer-backend: nixl
      enable-dp-attention: true
      enable-symm-mem: true
      expert-parallel-size: 4
      kv-cache-dtype: fp8_e4m3
      mem-fraction-static: 0.80
      model-path: /model/
      moe-dense-tp-size: 1
      moe-runner-backend: flashinfer_trtllm
      pipeline-parallel-size: 1
      prefill-round-robin-balance: true
      quantization: modelopt_fp4
      scheduler-recv-interval: 1
      served-model-name: deepseek-ai/DeepSeek-R1
      stream-interval: 10
      tensor-parallel-size: 4
      trust-remote-code: true
      watchdog-timeout: 1000000
    prefill:
      attention-backend: trtllm_mla
      chunked-prefill-size: 32000
      context-length: 136001
      data-parallel-size: 1
      disable-radix-cache: true
      disaggregation-bootstrap-port: 30001
      disaggregation-mode: prefill
      disaggregation-transfer-backend: nixl
      enable-symm-mem: true
      expert-parallel-size: 1
      kv-cache-dtype: fp8_e4m3
      load-balance-method: round_robin
      max-running-requests: 16
      mem-fraction-static: 0.72
      model-path: /model/
      moe-dense-tp-size: 1
      moe-runner-backend: flashinfer_trtllm
      pipeline-parallel-size: 4
      quantization: modelopt_fp4
      scheduler-recv-interval: 1
      served-model-name: deepseek-ai/DeepSeek-R1
      stream-interval: 10
      tensor-parallel-size: 1
      trust-remote-code: true
      watchdog-timeout: 1000000

profiling:
  type: "torch"
  prefill:
    start_step: 10
    stop_step: 20
  decode:
    start_step: 10
    stop_step: 20

benchmark:
  concurrencies: "8"
  isl: 128000
  osl: 8000
  req_rate: "inf"
  type: "sa-bench"
