# B200-FP8 8k1k — STP and MTP in one file
#
# Two inference modes distinguished by override key names:
#   zip_override_stp_*  — standard token prediction (no speculative decoding)
#   zip_override_mtp_*  — multi-token prediction (EAGLE speculative decoding)
#
# Low-latency variants: tep8 decode (DP=1)
# Max-throughput variants: dep8 decode (DP=8)
#
# Usage:
#   srtctl apply  -f recipes/b200-fp8/8k1k.yaml                              # all variants
#   srtctl apply  -f recipes/b200-fp8/8k1k.yaml:*stp*                        # all STP variants
#   srtctl apply  -f recipes/b200-fp8/8k1k.yaml:*mtp*                        # all MTP variants
#   srtctl apply  -f recipes/b200-fp8/8k1k.yaml:zip_override_stp_lowlat[0]   # STP fisrt config only
#   srtctl dry-run -f recipes/b200-fp8/8k1k.yaml                             # preview
#   srtctl resolve-override -f recipes/b200-fp8/8k1k.yaml                    # generate separate yaml files for each override
base:
  name: "b200-fp8-stp-8k1k"

  dynamo:
    version: "0.9.1"

  model:
    path: "dsr1-fp8"
    container: "dynamo-sglang"
    precision: "fp8"

  resources:
    gpu_type: "b200"
    prefill_nodes: 1
    prefill_workers: 1
    decode_nodes: 1
    decode_workers: 1
    gpus_per_node: 8

  backend:
    prefill_environment:
      TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
      PYTHONUNBUFFERED: "1"
      DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
      SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
      SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
      SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
      SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
      SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
      SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
      MC_FORCE_MNNVL: "1"
      NCCL_MNNVL_ENABLE: "1"
      NCCL_CUMEM_ENABLE: "1"
      DYN_REQUEST_PLANE: nats
      CUDA_SCALE_LAUNCH_QUEUES: "4x"
      SGLANG_PER_TOKEN_GROUP_QUANT_8BIT_V2: "1"

    decode_environment:
      TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
      PYTHONUNBUFFERED: "1"
      DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
      SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
      SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
      SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
      SGLANG_DECODE_BOOTSTRAP_TIMEOUT: "1000"
      SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
      SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
      SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
      MC_FORCE_MNNVL: "1"
      NCCL_MNNVL_ENABLE: "1"
      NCCL_CUMEM_ENABLE: "1"
      DYN_REQUEST_PLANE: nats
      CUDA_SCALE_LAUNCH_QUEUES: "4x"
      SGLANG_PER_TOKEN_GROUP_QUANT_8BIT_V2: "1"

    sglang_config:
      prefill:
        # Model configuration
        served-model-name: "deepseek-ai/DeepSeek-R1"
        trust-remote-code: true
        quantization: "fp8"

        # Disaggregation mode
        disaggregation-mode: "prefill"
        disaggregation-transfer-backend: nixl

        # Memory and token limits
        mem-fraction-static: 0.55
        max-prefill-tokens: 8192
        chunked-prefill-size: 65536
        max-running-requests: 32
        context-length: 9600

        # Parallelism
        tensor-parallel-size: 8
        data-parallel-size: 8
        expert-parallel-size: 1
        enable-dp-attention: true
        enable-dp-lm-head: true

        # Attention
        attention-backend: "trtllm_mla"
        kv-cache-dtype: "fp8_e4m3"

        # MoE
        moe-runner-backend: "flashinfer_trtllm"
        moe-dense-tp-size: 1

        # Other flags
        stream-interval: 30
        watchdog-timeout: 1000000
        enable-flashinfer-allreduce-fusion: true
        disable-radix-cache: true

      decode:
        # Model configuration
        served-model-name: "deepseek-ai/DeepSeek-R1"
        trust-remote-code: true
        quantization: "fp8"

        # Disaggregation mode
        disaggregation-mode: "decode"
        disaggregation-transfer-backend: nixl

        # Memory and token limits
        mem-fraction-static: 0.75
        context-length: 9600
        max-running-requests: 512
        cuda-graph-max-bs: 512

        # Parallelism
        tensor-parallel-size: 8
        data-parallel-size: 1
        expert-parallel-size: 8

        # Attention
        attention-backend: "trtllm_mla"
        kv-cache-dtype: "fp8_e4m3"

        # MoE
        moe-runner-backend: "flashinfer_trtllm"

        # Other flags
        stream-interval: 30
        watchdog-timeout: 1000000
        enable-flashinfer-allreduce-fusion: true
        disable-radix-cache: true
        # disable-chunked-prefix-cache: true

  health_check:
    max_attempts: 360
    interval_seconds: 10

  benchmark:
    type: "sa-bench"
    isl: 8192
    osl: 1024
    req_rate: "inf"


# STP low-latency: tp8 decode (DP=1)
zip_override_stp_lowlat:
  name:
    - "b200-fp8-stp-low-latency-tp8-1p-3d"
    - "b200-fp8-stp-low-latency-tp8-1p-4d"
    - "b200-fp8-stp-low-latency-tp8-1p-5d"
    - "b200-fp8-stp-low-latency-tp8-1p-6d"
    - "b200-fp8-stp-low-latency-tp8-1p-7d"
  resources:
    decode_nodes: [3, 4, 5, 6, 7]
    decode_workers: [3, 4, 5, 6, 7]
  backend:
    sglang_config:
      decode:
        expert-parallel-size: 1
        max-running-requests: [40, 24, 16, 8, 1]
        cuda-graph-max-bs: [40, 24, 16, 8, 1]
  benchmark:
    concurrencies: ["144", "120", "112", "16x32x64", "16"]


# MTP low-latency: same scales as STP, adds EAGLE speculative decoding
zip_override_mtp_lowlat:
  name:
    - "b200-fp8-mtp-low-latency-tp8-1p-3d"
    - "b200-fp8-mtp-low-latency-tp8-1p-4d"
    - "b200-fp8-mtp-low-latency-tp8-1p-5d"
    - "b200-fp8-mtp-low-latency-tp8-1p-6d"
    - "b200-fp8-mtp-low-latency-tp8-1p-7d"
  resources:
    decode_nodes: [3, 4, 5, 6, 7]
    decode_workers: [3, 4, 5, 6, 7]
  backend:
    prefill_environment:
      SGLANG_ENABLE_SPEC_V2: "1"
    decode_environment:
      SGLANG_ENABLE_SPEC_V2: "1"
    sglang_config:
      decode:
        expert-parallel-size: 1
        max-running-requests: [40, 24, 16, 8, 1]
        cuda-graph-max-bs: [40, 24, 16, 8, 1]
        speculative-algorithm: "EAGLE"
        speculative-num-steps: 2
        speculative-eagle-topk: 1
        speculative-num-draft-tokens: 3
  benchmark:
    concurrencies: ["144", "120", "112", "16x32x64", "16"]


# STP max-throughput: dtp8 decode (DP=8)
zip_override_stp_maxtpt:
  name:
    - "b200-fp8-stp-max-tpt-dep8-1p-2d"
    - "b200-fp8-stp-max-tpt-dep8-1p-1d"
    - "b200-fp8-stp-max-tpt-dep8-2p-1d"
    - "b200-fp8-stp-max-tpt-dep8-3p-1d"
  resources:
    prefill_nodes:   [1, 1, 2, 3]
    prefill_workers: [1, 1, 2, 3]
    decode_nodes:   [2, 1, 1, 1]
    decode_workers: [2, 1, 1, 1]
  backend:
    sglang_config:
      decode:
        data-parallel-size: 8
        enable-dp-attention: true
        enable-dp-lm-head: true
        moe-dense-tp-size: 1
        max-running-requests: [96, 192, 512, 1024]
        cuda-graph-max-bs: [96, 192, 512, 1024]
  benchmark:
    concurrencies: ["288", "256", "768", "1280"]


# MTP max-throughput: dtp8 decode, adds EAGLE speculative decoding
zip_override_mtp_maxtpt:
  name:
    - "b200-fp8-mtp-max-tpt-dep8-1p-2d"
    - "b200-fp8-mtp-max-tpt-dep8-1p-1d"
    - "b200-fp8-mtp-max-tpt-dep8-2p-1d"
    - "b200-fp8-mtp-max-tpt-dep8-3p-1d"
  resources:
    prefill_nodes: [1, 1, 2, 3]
    prefill_workers: [1, 1, 2, 3]
    decode_nodes: [2, 1, 1, 1]
    decode_workers: [2, 1, 1, 1]
  backend:
    prefill_environment:
      SGLANG_ENABLE_SPEC_V2: "1"
    decode_environment:
      SGLANG_ENABLE_SPEC_V2: "1"
    sglang_config:
      decode:
        data-parallel-size: 8
        enable-dp-attention: true
        enable-dp-lm-head: true
        moe-dense-tp-size: 1
        max-running-requests: [96, 192, 512, 1024]
        cuda-graph-max-bs: [96, 192, 512, 1024]
        speculative-algorithm: "EAGLE"
        speculative-num-steps: 2
        speculative-eagle-topk: 1
        speculative-num-draft-tokens: 3
  benchmark:
    concurrencies: ["288", "256", "768", "1280"]
