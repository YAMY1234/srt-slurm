# Experiment A: Remove MTP draft model MoE backends
# DIFF vs baseline: removed speculative-moe-runner-backend and speculative-moe-a2a-backend
# Purpose: Test if the MTP draft model's MoE backend (deep_gemm + deepep) causes the OOB
# Expected: If OOB disappears → bug is in the MTP draft model's MoE path

name: "exp-a-no-mtp-moe-be"

model:
  path: "dsfp4"
  container: "v0.5.7"
  precision: "fp4"

resources:
  gpu_type: "gb200"
  prefill_nodes: 1
  prefill_workers: 1
  decode_nodes: 2
  decode_workers: 1
  gpus_per_node: 4

backend:

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "7200"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_NVFP4_CKPT_FP8_GEMM_IN_ATTN: "1"
    SGLANG_PER_TOKEN_GROUP_QUANT_8BIT_V2: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_HACK_SEQ_BOOTSTRAP_ROOM: "1"
    MC_TE_METRIC: "true"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "1024"
    SGLANG_MOE_NVFP4_DISPATCH: "1"
    SGLANG_NVFP4_CKPT_FP8_NEXTN_MOE: "1"
    SGLANG_FLASHINFER_FP4_GEMM_BACKEND: "cutlass"
    FLASHINFER_DISABLE_VERSION_CHECK: "1"
    FLASHINFER_WORKSPACE_BASE: /config/flashinfer-cache
    SGLANG_DG_CACHE_DIR: /configs/deepgemm-cache
    SGLANG_CUTEDSL_MOE_NVFP4_DISPATCH: "1"
    SGLANG_ENABLE_SPEC_V2: "1"
    SGLANG_NCCL_ALL_GATHER_IN_OVERLAP_SCHEDULER_SYNC_BATCH: "1"
    SGLANG_BLACKWELL_OVERLAP_SHARED_EXPERTS_OUTSIDE_SBO: "1"

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "7200"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_NVFP4_CKPT_FP8_GEMM_IN_ATTN: "1"
    SGLANG_PER_TOKEN_GROUP_QUANT_8BIT_V2: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_HACK_SEQ_BOOTSTRAP_ROOM: "1"
    MC_TE_METRIC: "true"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
    SGLANG_FLASHINFER_FP4_GEMM_BACKEND: "cutlass"
    FLASHINFER_DISABLE_VERSION_CHECK: "1"
    FLASHINFER_WORKSPACE_BASE: /config/flashinfer-cache
    SGLANG_DG_CACHE_DIR: /configs/deepgemm-cache

  sglang_config:
    decode:
      attention-backend: trtllm_mla
      chunked-prefill-size: -1
      context-length: 4096
      cuda-graph-max-bs: 512
      data-parallel-size: 8
      disable-radix-cache: true
      disaggregation-bootstrap-port: 30001
      disaggregation-mode: decode
      disaggregation-transfer-backend: nixl
      enable-dp-attention: true
      enable-dp-lm-head: true
      expert-parallel-size: 8
      kv-cache-dtype: fp8_e4m3
      max-running-requests: 4096
      mem-fraction-static: 0.65
      model-path: /model/
      moe-dense-tp-size: 1
      moe-runner-backend: flashinfer_cutedsl
      moe-a2a-backend: deepep
      deepep-mode: low_latency
      ep-dispatch-algorithm: static
      ep-num-redundant-experts: 16
      disable-shared-experts-fusion: true
      eplb-algorithm: deepseek
      pipeline-parallel-size: 1
      prefill-round-robin-balance: true
      quantization: modelopt_fp4
      scheduler-recv-interval: 1
      served-model-name: deepseek-ai/DeepSeek-R1
      stream-interval: 10
      tensor-parallel-size: 8
      trust-remote-code: true
      watchdog-timeout: 1000000
      # MTP - same as baseline BUT without speculative-moe-runner-backend and speculative-moe-a2a-backend
      speculative-algorithm: "EAGLE"
      speculative-num-steps: 1
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 2
      # REMOVED: speculative-moe-runner-backend: "deep_gemm"
      # REMOVED: speculative-moe-a2a-backend: "deepep"
      enable-single-batch-overlap: false

    prefill:
      attention-backend: trtllm_mla
      chunked-prefill-size: -1
      context-length: 2200
      data-parallel-size: 4
      disable-radix-cache: true
      enable-dp-attention: true
      disaggregation-bootstrap-port: 30001
      disaggregation-mode: prefill
      disaggregation-transfer-backend: nixl
      expert-parallel-size: 4
      kv-cache-dtype: fp8_e4m3
      load-balance-method: round_robin
      max-running-requests: 4096
      mem-fraction-static: 0.72
      model-path: /model/
      moe-dense-tp-size: 1
      moe-runner-backend: flashinfer_trtllm
      pipeline-parallel-size: 1
      quantization: modelopt_fp4
      scheduler-recv-interval: 1
      served-model-name: deepseek-ai/DeepSeek-R1
      stream-interval: 10
      tensor-parallel-size: 4
      trust-remote-code: true
      watchdog-timeout: 1000000

extra_mount:
  - "/lustre/fsw/coreai_comparch_trtllm/yangminl/sglang:/sgl-workspace/sglang"

benchmark:
  concurrencies: "1024x2048x4096x8192"
  isl: 512
  osl: 1000
  req_rate: "inf"
  type: "sa-bench"
